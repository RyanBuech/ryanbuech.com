<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta property="og:image" content="./images/R.png">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:width" content="1024">
    <meta property="og:image:height" content="1024">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="icon" href="./images/R.png">
    <link rel="image_src" href="./images/MetaImage.jpg">
    <!-- HTML Meta Tags -->
    <title>Ryan Buech - Contact</title>

    <script src="http://ajax.googleapis.com/ajax/libs/jquery/1.11.2/jquery.min.js"></script>
    <script>
        $(function()
        {
            $("#includeHTML").load("include.html");
        });
    </script>
    <div id="includeHTML"></div>
</head>

<body>
    <div class="content">
        <div class="row">
            <div class="column">
                   
                <grey>Contact Me</grey><br><br>

                <form class="contact" action="./sucess.html" data-netlify="true" netlify-honeypot="bot-field">
                    <input name="bot-field" class="hidden">
                    <input type="text" name="name" class="contact-form-text" placeholder="Name" required oninvalid="this.setCustomValidity('Name is required.')"
                    oninput="this.setCustomValidity('')">
                    <input type="email" name="email" class="contact-form-text" placeholder="Email" required oninvalid="this.setCustomValidity('Email is required.')"
                    oninput="this.setCustomValidity('')">
                    <textarea type ="text" name="message" class="contact-form-text" placeholder="Message" required oninvalid="this.setCustomValidity('Message is required.')"
                    oninput="this.setCustomValidity('')"></textarea>
                    <input type="submit" class="contact-form-btn" value="Send">
                </form>
                
                <br><br><br>
            </div>

            <div class="column">
                <img class="image" src="./images/RyanBuech.jpg" alt="">
            </div>            
        </div>

        <div class="push"></div>

    </div>    

    <div class="imgpopup">
        <div class="showoverlay"></div>
        
        <div class="imgshow">
                <div class="close">+</div>
            <img src="">
        </div>
    </div>

    <div class="footer">
        <p class="foot"></p>
    </div>   

    <script src="./includes/jquery-3.4.1.min.js"></script>
    <script src="./includes/app.js"></script>
</body>
</html>
