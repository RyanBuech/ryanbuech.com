<body>
    <div class="nav">
        <label for="toggle">&#9776;</label>
        <input type="checkbox" id="toggle">
        <div class="menu">
                <a href="./index.html">Home</a>
                <a href="./work.html">Work</a>

        </div>        

        <img src="./images/White R.png" class="cover">
    </div>     

    <div class="content">
        <div class="row">
            <div class="column">
                   
                <grey>Contact Me</grey><br><br>

                <form class="contact" action="./sucess.html" data-netlify="true" netlify-honeypot="bot-field">
                    <input name="bot-field" class="hidden">
                    <input type="text" name="name" class="contact-form-text" placeholder="Name" required oninvalid="this.setCustomValidity('Name is required.')"
                    oninput="this.setCustomValidity('')">
                    <input type="email" name="email" class="contact-form-text" placeholder="Email" required oninvalid="this.setCustomValidity('Email is required.')"
                    oninput="this.setCustomValidity('')">
                    <textarea type ="text" name="message" class="contact-form-text" placeholder="Message" required oninvalid="this.setCustomValidity('Message is required.')"
                    oninput="this.setCustomValidity('')"></textarea>
                    <input type="submit" class="contact-form-btn" value="Send">
                </form>
                
                <br><br><br>
            </div>

            <div class="column">
                <img class="image" src="./images/RyanBuech.jpg" alt="">
            </div>            
        </div>

        <div class="push"></div>

    </div>    

    <div class="imgpopup">
        <div class="showoverlay"></div>
        
        <div class="imgshow">
                <div class="close">+</div>
            <img src="">
        </div>
    </div>

    <div class="footer">
        <p class="foot"></p>
    </div>

    <div class="video-container">
        <div class="color-overlay"></div>
            <video autoplay loop muted poster="./videos/Poster.png">
                <source src="./videos/Geometric Particles.mp4" type="video/mp4">
                <source src="./videos/Geometric Particles.webm" type="video/webm">
                <source src="./videos/Geometric Particles.ogv" type="video/ogg">
            </video>
        </div>
    </div>
